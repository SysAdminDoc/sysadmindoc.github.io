name: GitHub data health check

on:
  workflow_dispatch:
  schedule:
    # Verify GitHub API access and data freshness daily at 07:00 UTC.
    # Generated files are gitignored — this is a health check, not a commit-back.
    # Actual data refresh happens at deploy time via the deploy workflow.
    #
    # Rationale for running the FULL fetch-stars rather than a lightweight probe:
    # it exercises the exact production data path (profile feed, pagination,
    # events, releases, README fetch + schema shape) so an API change,
    # rate-limit regression, or parser break surfaces here a day before it can
    # fail a real deploy. The --fail-on-stale summary gate then catches stale
    # caches. The refreshed data is intentionally discarded (gitignored).
    - cron: '0 7 * * *'

permissions:
  contents: read

concurrency:
  group: github-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Require GitHub token
        run: node -e "if (!process.env.GITHUB_TOKEN) { console.error('GITHUB_TOKEN is required for generated data refresh.'); process.exit(1); }"
      - name: Refresh generated GitHub data
        run: npm run fetch-stars
      - name: Refresh profile feed cache
        run: npm run profile-feed:sync
      - name: Summarize generated data
        run: npm run data:summary -- --out data-refresh-summary --max-age-hours 36 --fail-on-stale
      - name: Publish job summary
        run: cat data-refresh-summary/summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload generated data summary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-data-refresh-summary
          path: data-refresh-summary/
          if-no-files-found: error
