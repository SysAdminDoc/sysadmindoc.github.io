name: GitHub data health check

on:
  workflow_dispatch:
  schedule:
    # Verify GitHub API access and data freshness daily at 07:00 UTC.
    # Generated files are gitignored — this is a health check, not a commit-back.
    # Actual data refresh happens at deploy time via the deploy workflow.
    #
    # Rationale for running the FULL fetch-stars rather than a lightweight probe:
    # it exercises the exact production data path (pagination, events, releases,
    # README fetch + schema shape) so an API change, rate-limit regression, or a
    # parser break surfaces here a day before it can fail a real deploy. The
    # --fail-on-stale summary gate then catches stale caches. The refreshed data
    # is intentionally discarded (gitignored).
    - cron: '0 7 * * *'

permissions:
  contents: read

concurrency:
  group: github-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Require GitHub token
        run: node -e "if (!process.env.GITHUB_TOKEN) { console.error('GITHUB_TOKEN is required for generated data refresh.'); process.exit(1); }"
      - name: Refresh generated GitHub data
        run: npm run fetch-stars
      - name: Summarize generated data
        run: npm run data:summary -- --out data-refresh-summary --max-age-hours 36 --fail-on-stale
      - name: Publish job summary
        run: cat data-refresh-summary/summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload generated data summary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: github-data-refresh-summary
          path: data-refresh-summary/
          if-no-files-found: error
