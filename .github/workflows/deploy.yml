name: Deploy portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  attestations: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    outputs:
      package_version: ${{ steps.live_smoke_contract.outputs.package_version }}
      projects_count: ${{ steps.live_smoke_contract.outputs.projects_count }}
      releases_count: ${{ steps.live_smoke_contract.outputs.releases_count }}
      feed_item_count: ${{ steps.live_smoke_contract.outputs.feed_item_count }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Unit tests
        run: npm test
      - name: Audit production dependencies
        run: npm run audit:prod
      - name: Audit public repository catalog
        run: npm run catalog:audit
      - name: Validate project data
        run: npm run data:validate
      - name: Audit assets and source references
        run: npm run assets:audit
      - name: Audit image pipeline
        run: npm run images:audit
      - name: Require GitHub token
        run: node -e "if (!process.env.GITHUB_TOKEN) { console.error('GITHUB_TOKEN is required for generated data refresh.'); process.exit(1); }"
      - name: Fetch GitHub star counts
        run: npm run fetch-stars
      - name: Sync profile feed cache
        run: npm run profile-feed:sync
      - name: Summarize generated data
        run: npm run data:summary -- --out data-refresh-summary --max-age-hours 36 --fail-on-stale
      - name: Publish generated data summary
        run: cat data-refresh-summary/summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload generated data summary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-data-refresh-summary
          path: data-refresh-summary/
          if-no-files-found: error
      - name: Run Astro type checks
        run: npx astro check
      - name: Build Astro site
        run: npm run build:ci
      - name: Accessibility audit
        run: npm run a11y:audit
      - name: Capture live smoke contract
        id: live_smoke_contract
        run: node scripts/smoke-live-site.mjs --emit-contract --dist dist
      - name: Generate SBOM
        run: npm sbom --sbom-format cyclonedx --omit dev > dist-sbom.cdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: dist-sbom.cdx.json
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./dist
      - name: Attest Pages artifact
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist-sbom.cdx.json

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
      - name: Smoke deployed artifacts
        run: >
          npm run smoke:live --
          --base-url "${{ steps.deployment.outputs.page_url }}"
          --expected-version "${{ needs.build.outputs.package_version }}"
          --expected-projects "${{ needs.build.outputs.projects_count }}"
          --expected-releases "${{ needs.build.outputs.releases_count }}"
          --expected-feed-items "${{ needs.build.outputs.feed_item_count }}"
