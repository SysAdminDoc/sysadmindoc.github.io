name: Deploy portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Audit production dependencies
        run: npm run audit:prod
      - name: Audit public repository catalog
        run: npm run catalog:audit
      - name: Validate project data
        run: npm run data:validate
      - name: Audit assets and source references
        run: npm run assets:audit
      - name: Require GitHub token
        run: node -e "if (!process.env.GITHUB_TOKEN) { console.error('GITHUB_TOKEN is required for generated data refresh.'); process.exit(1); }"
      - name: Fetch GitHub star counts
        run: npm run fetch-stars
      - name: Summarize generated data
        run: npm run data:summary -- --out data-refresh-summary --max-age-hours 36 --fail-on-stale
      - name: Publish generated data summary
        run: cat data-refresh-summary/summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload generated data summary
        uses: actions/upload-artifact@v7
        with:
          name: github-data-refresh-summary
          path: data-refresh-summary/
          if-no-files-found: error
      - name: Run Astro checks
        run: npm run check
      - name: Build Astro site
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
