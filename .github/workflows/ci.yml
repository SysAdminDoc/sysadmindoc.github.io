name: CI

# Build + test gate for pull requests so changes (including Dependabot PRs)
# are validated before merge. No Pages deploy and no GITHUB_TOKEN data refresh —
# the build installs schema-valid generated-data fixtures.

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9 # v4.7.1
        with:
          fail-on-severity: high

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install generated-data fixtures
        run: npm run generated:fixtures
      - name: Unit tests
        run: npm test
      - name: Validate + type-check
        env:
          PROFILE_PROJECTS_OFFLINE: '1'
        run: npm run check
      - name: Build site
        run: npm run build:ci
      - name: Lighthouse CI budget (advisory)
        continue-on-error: true
        timeout-minutes: 6
        run: npm run lhci:audit
      - name: Summarize Lighthouse warnings
        if: always()
        run: |
          npm run lhci:summary -- --out .tmp/lhci/summary.md
          cat .tmp/lhci/summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-ci-reports
          path: .tmp/lhci
          if-no-files-found: ignore
      - name: Accessibility audit
        run: npm run a11y:audit
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('**/package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Rendered interaction smoke
        run: npm run audit:interactions
      - name: Browser accessibility and visual audit
        run: npm run audit:playwright
      - name: Upload Playwright reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-audit-reports
          path: |
            .tmp/playwright-report
            .tmp/playwright-results
            .tmp/playwright-interactions-report
            .tmp/playwright-interactions-results
          if-no-files-found: ignore
