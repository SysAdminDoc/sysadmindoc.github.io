name: CI

# Build + test gate for pull requests so changes (including Dependabot PRs)
# are validated before merge. No Pages deploy and no GITHUB_TOKEN data refresh —
# the build falls back to empty generated-data caches.

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Stub generated caches
        # The _*.json caches are gitignored and only produced by fetch-stars
        # (which needs a token). On a PR we don't refresh data, so write empty
        # stubs that satisfy the dynamic imports for type-check + build.
        shell: bash
        run: |
          printf '{}' > src/data/_stars.json
          printf '{}' > src/data/_meta.json
          printf '{}' > src/data/_readmes.json
          printf '[]' > src/data/_releases.json
          printf '{}' > src/data/_stats.json
      - name: Unit tests
        run: npm test
      - name: Validate + type-check
        run: npm run check
      - name: Build site
        run: npm run build:ci
      - name: Lighthouse CI budget (advisory)
        continue-on-error: true
        timeout-minutes: 6
        run: npm run lhci:audit
      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-ci-reports
          path: .tmp/lhci
          if-no-files-found: ignore
      - name: Accessibility audit (advisory)
        run: npm run a11y:audit || echo "a11y audit reported issues (advisory)"
