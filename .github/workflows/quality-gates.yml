name: Weekly quality gates

on:
  workflow_dispatch:
  schedule:
    # Report production audit and public catalog drift every Monday at 09:00 UTC.
    - cron: '0 9 * * 1'

permissions:
  contents: read
  issues: write

concurrency:
  group: weekly-quality-gates
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run production audit report
        id: prod_audit
        shell: bash
        run: |
          set +e
          npm run audit:prod > prod-audit.log 2>&1
          code=$?
          cat prod-audit.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Run public catalog audit report
        id: catalog_audit
        shell: bash
        run: |
          set +e
          npm run catalog:audit > catalog-audit.log 2>&1
          code=$?
          cat catalog-audit.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Run semantic index audit (advisory)
        id: semantic_audit
        shell: bash
        run: |
          set +e
          npm run semantic:audit > semantic-audit.log 2>&1
          code=$?
          cat semantic-audit.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Run generated data refresh report
        id: generated_data
        shell: bash
        run: |
          set +e
          first_failure=0

          npm run fetch-stars > fetch-stars.log 2>&1
          fetch_code=$?
          cat fetch-stars.log
          if [ "$first_failure" -eq 0 ] && [ "$fetch_code" -ne 0 ]; then
            first_failure="$fetch_code"
          fi

          npm run profile-feed:sync > profile-feed-sync.log 2>&1
          profile_code=$?
          cat profile-feed-sync.log
          if [ "$first_failure" -eq 0 ] && [ "$profile_code" -ne 0 ]; then
            first_failure="$profile_code"
          fi

          echo "exit_code=$first_failure" >> "$GITHUB_OUTPUT"
          echo "fetch_exit_code=$fetch_code" >> "$GITHUB_OUTPUT"
          echo "profile_exit_code=$profile_code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Run local quality checks
        id: local_checks
        shell: bash
        run: |
          set +e
          first_failure=0

          npm run data:validate > data-validate.log 2>&1
          data_code=$?
          cat data-validate.log
          if [ "$first_failure" -eq 0 ] && [ "$data_code" -ne 0 ]; then
            first_failure="$data_code"
          fi

          npm run assets:audit > assets-audit.log 2>&1
          assets_code=$?
          cat assets-audit.log
          if [ "$first_failure" -eq 0 ] && [ "$assets_code" -ne 0 ]; then
            first_failure="$assets_code"
          fi

          npm run check > astro-check.log 2>&1
          check_code=$?
          cat astro-check.log
          if [ "$first_failure" -eq 0 ] && [ "$check_code" -ne 0 ]; then
            first_failure="$check_code"
          fi

          echo "exit_code=$first_failure" >> "$GITHUB_OUTPUT"
          echo "data_exit_code=$data_code" >> "$GITHUB_OUTPUT"
          echo "assets_exit_code=$assets_code" >> "$GITHUB_OUTPUT"
          echo "check_exit_code=$check_code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Run build-output audit report
        id: build_output_audits
        shell: bash
        run: |
          set +e

          run_report() {
            local label="$1"
            local log_file="$2"
            shift 2
            echo "::group::$label"
            "$@" > "$log_file" 2>&1
            local code=$?
            cat "$log_file"
            echo "::endgroup::"
            return "$code"
          }

          first_failure=0
          record_failure() {
            local code="$1"
            if [ "$first_failure" -eq 0 ] && [ "$code" -ne 0 ]; then
              first_failure="$code"
            fi
          }

          run_report "Run build-output audit path" build-output-audits.log npm run build:ci
          build_code=$?
          record_failure "$build_code"

          run_report "Audit public endpoint contracts" endpoints-audit.log npm run endpoints:audit
          endpoints_code=$?
          record_failure "$endpoints_code"

          run_report "Audit JSON Feed contract" feed-audit.log npm run feed:audit
          feed_code=$?
          record_failure "$feed_code"

          run_report "Generate Pagefind search index" search-index.log npm run search:index
          search_index_code=$?
          record_failure "$search_index_code"

          if [ "$search_index_code" -eq 0 ]; then
            run_report "Audit Pagefind search output" search-audit.log npm run search:audit
            search_code=$?
          else
            search_code="$search_index_code"
            {
              echo "Skipped search:audit because search:index failed."
              echo "See search-index.log for details."
            } > search-audit.log
            cat search-audit.log
          fi
          record_failure "$search_code"

          run_report "Audit rendered JSON-LD output" schema-audit.log npm run schema:audit
          schema_code=$?
          record_failure "$schema_code"

          run_report "Audit forced-colors data visualizations" forced-colors-audit.log npm run forced-colors:audit
          forced_colors_code=$?
          record_failure "$forced_colors_code"

          echo "exit_code=$first_failure" >> "$GITHUB_OUTPUT"
          echo "build_exit_code=$build_code" >> "$GITHUB_OUTPUT"
          echo "endpoints_exit_code=$endpoints_code" >> "$GITHUB_OUTPUT"
          echo "feed_exit_code=$feed_code" >> "$GITHUB_OUTPUT"
          echo "search_exit_code=$search_code" >> "$GITHUB_OUTPUT"
          echo "schema_exit_code=$schema_code" >> "$GITHUB_OUTPUT"
          echo "forced_colors_exit_code=$forced_colors_code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Run performance audit report (advisory)
        id: performance_audit
        shell: bash
        run: |
          set +e
          mkdir -p .tmp

          if [ "${{ steps.build_output_audits.outputs.build_exit_code }}" != "0" ]; then
            {
              echo "Skipped performance audit because build:ci did not complete successfully."
              echo "See build-output-audits.log for the build failure."
            } > performance-audit.log
            cat performance-audit.log
            echo "exit_code=skipped" >> "$GITHUB_OUTPUT"
            echo "status=SKIPPED" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_url="http://127.0.0.1:4321"
          npm run preview -- --host 127.0.0.1 --port 4321 > preview.log 2>&1 &
          preview_pid=$!
          cleanup() {
            if kill -0 "$preview_pid" 2>/dev/null; then
              kill "$preview_pid" 2>/dev/null || true
              wait "$preview_pid" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          ready=0
          for _ in {1..45}; do
            if curl -fsS "$base_url" >/dev/null 2>&1; then
              ready=1
              break
            fi
            if ! kill -0 "$preview_pid" 2>/dev/null; then
              break
            fi
            sleep 1
          done

          if [ "$ready" -ne 1 ]; then
            {
              echo "Preview server did not become ready at $base_url."
              echo ""
              echo "Preview log:"
              cat preview.log
            } > performance-audit.log
            perf_code=1
          else
            npm run audit:perf -- --base "$base_url" --strict --lcp 60000 --event 500 --out .tmp/performance-audit-ci.json > performance-audit.log 2>&1
            perf_code=$?
          fi

          cat performance-audit.log
          if [ -f .tmp/performance-audit-ci.json ]; then
            node scripts/summarize-performance-audit.mjs .tmp/performance-audit-ci.json > performance-summary.md || true
          else
            {
              echo "## Performance/bfcache audit"
              echo ""
              echo "No JSON report was produced. See performance-audit.log and preview.log."
            } > performance-summary.md
          fi

          echo "exit_code=$perf_code" >> "$GITHUB_OUTPUT"
          if [ "$perf_code" -eq 0 ]; then
            echo "status=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "status=ATTENTION" >> "$GITHUB_OUTPUT"
          fi
          exit 0
      - name: Publish quality summary
        shell: bash
        run: |
          {
            echo "# Weekly quality gates"
            echo ""
            echo "- Production dependency audit: ${{ steps.prod_audit.outputs.exit_code == '0' && 'PASS' || 'FAIL' }}"
            echo "- Public catalog drift audit: ${{ steps.catalog_audit.outputs.exit_code == '0' && 'PASS' || 'FAIL' }}"
            echo "- Semantic index audit (advisory): ${{ steps.semantic_audit.outputs.exit_code == '0' && 'PASS' || 'ATTENTION' }}"
            echo "- Generated data refresh: ${{ steps.generated_data.outputs.exit_code == '0' && 'PASS' || 'FAIL' }}"
            echo "- Local data/assets/Astro checks: ${{ steps.local_checks.outputs.exit_code == '0' && 'PASS' || 'FAIL' }}"
            echo "- Build-output audit path: ${{ steps.build_output_audits.outputs.exit_code == '0' && 'PASS' || 'FAIL' }}"
            echo "  - Build path: ${{ steps.build_output_audits.outputs.build_exit_code == '0' && 'PASS' || 'FAIL' }}"
            echo "  - Endpoint contracts: ${{ steps.build_output_audits.outputs.endpoints_exit_code == '0' && 'PASS' || 'FAIL' }}"
            echo "  - JSON Feed: ${{ steps.build_output_audits.outputs.feed_exit_code == '0' && 'PASS' || 'FAIL' }}"
            echo "  - Pagefind search: ${{ steps.build_output_audits.outputs.search_exit_code == '0' && 'PASS' || 'FAIL' }}"
            echo "  - Rendered JSON-LD: ${{ steps.build_output_audits.outputs.schema_exit_code == '0' && 'PASS' || 'FAIL' }}"
            echo "  - Forced-colors data visualizations: ${{ steps.build_output_audits.outputs.forced_colors_exit_code == '0' && 'PASS' || 'FAIL' }}"
            echo "- Performance/bfcache audit (advisory): ${{ steps.performance_audit.outputs.status }}"
            echo ""
            echo "See the uploaded quality-gate-reports artifact for command logs."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -f performance-summary.md ]; then
            cat performance-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload quality gate reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quality-gate-reports
          path: |
            prod-audit.log
            catalog-audit.log
            semantic-audit.log
            data-validate.log
            assets-audit.log
            astro-check.log
            fetch-stars.log
            profile-feed-sync.log
            build-output-audits.log
            endpoints-audit.log
            feed-audit.log
            search-index.log
            search-audit.log
            schema-audit.log
            forced-colors-audit.log
            preview.log
            performance-audit.log
            performance-summary.md
            .tmp/performance-audit-ci.json
          if-no-files-found: error
      - name: Open or update quality gate issue
        if: steps.prod_audit.outputs.exit_code != '0' || steps.catalog_audit.outputs.exit_code != '0' || steps.generated_data.outputs.exit_code != '0' || steps.local_checks.outputs.exit_code != '0' || steps.build_output_audits.outputs.exit_code != '0' || steps.performance_audit.outputs.exit_code != '0'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('node:fs');
            const title = 'Portfolio quality gates need attention';
            const readLog = (file) => fs.existsSync(file) ? fs.readFileSync(file, 'utf8').slice(-6000) : `Missing ${file}`;
            const sections = [
              ['Production audit', 'prod-audit.log'],
              ['Catalog audit', 'catalog-audit.log'],
              ['Generated GitHub metadata refresh', 'fetch-stars.log'],
              ['Profile feed sync', 'profile-feed-sync.log'],
              ['Data validation', 'data-validate.log'],
              ['Asset audit', 'assets-audit.log'],
              ['Astro check', 'astro-check.log'],
              ['Build-output audit path', 'build-output-audits.log'],
              ['Endpoint contracts', 'endpoints-audit.log'],
              ['JSON Feed', 'feed-audit.log'],
              ['Pagefind search index', 'search-index.log'],
              ['Pagefind search audit', 'search-audit.log'],
              ['Rendered JSON-LD', 'schema-audit.log'],
              ['Forced-colors data visualizations', 'forced-colors-audit.log'],
              ['Performance/bfcache audit (advisory)', 'performance-audit.log'],
              ['Performance/bfcache summary', 'performance-summary.md'],
              ['Semantic index audit (advisory only)', 'semantic-audit.log'],
            ];
            const body = [
              'The scheduled portfolio quality gates detected a production dependency, public catalog drift, generated-data, local validation, build-output audit, or advisory performance/bfcache issue.',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              ...sections.flatMap(([heading, file]) => [
                `## ${heading}`,
                '```text',
                readLog(file),
                '```',
                '',
              ]),
              'Close this issue after the underlying dependency, catalog drift, generated-data, local validation, build-output contract, or performance/bfcache problem is fixed and the workflow is green.',
            ].join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title && !issue.pull_request);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
      - name: Fail on reported gate failures
        if: steps.prod_audit.outputs.exit_code != '0' || steps.catalog_audit.outputs.exit_code != '0' || steps.generated_data.outputs.exit_code != '0' || steps.local_checks.outputs.exit_code != '0' || steps.build_output_audits.outputs.exit_code != '0'
        run: exit 1
